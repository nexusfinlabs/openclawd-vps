<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-family: Arial, sans-serif;
                font-size: 10pt;
                color: #666;
            }
        }
        
        body {
            font-family: Arial, sans-serif;
            font-size: 14pt;
            line-height: 1.6;
            color: #1a1a1a;
            hyphens: auto;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: #000;
            margin-top: 2em;
            margin-bottom: 1em;
        }

        h1 { 
            font-size: 16pt; 
            text-align: center; 
            text-transform: uppercase;
        }
        
        h2 { 
            font-size: 14pt; 
            text-transform: uppercase;
            border-top: 1px solid #e0e0e0;
            padding-top: 1.5em;
        }
        
        h3 { 
            font-size: 14pt; 
        }

        p {
            margin-bottom: 1em;
            text-align: justify;
        }

        /* Technical Terms styling */
        .tech-term, code, pre {
            font-style: italic;
            font-family: Arial, sans-serif; /* Forcing Arial per user request even for code */
            background-color: transparent; /* No background to keep it clean */
            color: #333;
        }

        /* Specific styles for document blocks */
        .header-block {
            margin-bottom: 3em;
        }
        
        .meta-data {
            margin-bottom: 2em;
        }
        
        .meta-data table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .meta-data td {
            padding: 5px;
            vertical-align: top;
        }
        
        .meta-label {
            font-weight: bold;
            text-transform: uppercase;
            width: 30%;
        }

        .signatures {
            margin-top: 4em;
            width: 100%;
        }
        
        .signatures table {
            width: 100%;
        }
        
        .signature-box {
            width: 45%;
            border-top: 1px solid #000;
            padding-top: 10px;
            margin-top: 50px;
        }
        
        .signature-title {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12pt;
        }

        ul, ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }
        
        li {
            margin-bottom: 0.5em;
            text-align: justify;
        }
        
        /* Utility Classes */
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .mt-1 { margin-top: 1em; }
        .mt-2 { margin-top: 2em; }
        .mb-1 { margin-bottom: 1em; }
        
        /* Table Styling for Scopes/Pricing */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-size: 12pt;
        }
        
        .data-table th, .data-table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        
        .data-table th {
            background-color: #f5f5f5;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
